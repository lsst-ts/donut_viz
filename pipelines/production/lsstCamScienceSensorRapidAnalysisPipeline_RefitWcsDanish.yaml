# similar to production/lsstCamScienceSensorRapidAnalysisPipeline_Danish.yaml
# and production/lsstCamRapidAnalysisPipeline_RefitWcsDanish.yaml
description: rapid analysis pipeline for LSSTCam
instrument: lsst.obs.lsst.LsstCam
imports:
  - $DONUT_VIZ_DIR/pipelines/_ingredients/wepRefitWcsScienceSensorPipeline.yaml
  - $DONUT_VIZ_DIR/pipelines/_ingredients/donutVizGroupPipeline.yaml

# Define pipeline steps
subsets:
  step1a-detectors:
    subset:
      - isr
      - generateDonutDirectDetectTask
      - generateDonutFromRefitWcsTask
      - cutOutDonutsScienceSensorGroupTask
      - calcZernikesTask
    description: |
      This step processes the input images with ISR,
      finds and cuts out the donut stamps,
      and estimates the Zernike coefficients from the donut pairs.
  step1b-visits:
    subset:
      - aggregateZernikeTablesTask
      - aggregateDonutTablesVisitTask
      - aggregateAOSVisitTableTask
      - plotAOSTask
      - aggregateDonutStampsTask
      - plotDonutTask
      - plotPsfZernTask
    description: |
      AOS Donut visualization plotting tasks. This step generates plots
      (including the pyramid residual and donut gallery) and
      tables for the AOS visit.
  visit-pair-merge-task:
    - cutOutDonutsScienceSensorGroupTask

steps:
  - label: step1a-detectors
    dimensions: [detector]
  - label: step1b-visits
    dimensions: []
