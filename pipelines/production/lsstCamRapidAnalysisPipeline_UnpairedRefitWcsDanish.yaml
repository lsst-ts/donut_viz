description: rapid analysis pipeline for LSSTCam
instrument: lsst.obs.lsst.LsstCam
imports:
  - location: $DONUT_VIZ_DIR/pipelines/_ingredients/wepRefitWcsUnpairedPipeline.yaml
  - location: $DONUT_VIZ_DIR/pipelines/_ingredients/donutVizUnpairedPipeline.yaml
tasks:
  aggregateDonutTablesUnpairedTask:
    class: lsst.donut.viz.AggregateDonutTablesUnpairedTask
    config:
      connections.donutTables: refitWcsDonutTable

# Define pipeline steps
subsets:
  step1a-detectors:
    subset:
      - isr
      - generateDonutDirectDetectTask
      - generateDonutFromRefitWcsTask
      - cutOutDonutsCwfsPairTask
      - calcZernikesUnpairedTask
    description: |
      This step processes the input images with ISR,
      finds and cuts out the donut stamps,
      and estimates the Zernike coefficients from unpaired donuts.
  step1b-visits:
    subset:
      - aggregateZernikeTablesTask
      - aggregateDonutTablesUnpairedTask
      - aggregateAOSVisitTableUnpairedTask
      - aggregateDonutStampsUnpairedTask
      - plotAOSTask
      - plotDonutUnpairedCwfsTask
      - plotDonutFitsUnpairedTask
    description: |
      AOS Donut visualization plotting tasks. This step generates plots
      (including the pyramid residual and donut gallery) and
      tables for the AOS visit.

steps:
  - label: step1a-detectors
    dimensions: [visit, detector]
  - label: step1b-visits
    dimensions: [visit]